name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install web dependencies
        run: cd web && bun install

      - name: Build web frontend
        run: bun run build:web

      - name: Embed web assets
        run: bun scripts/embed-assets.ts

      - name: Compile Windows binary
        run: bun build --compile --define __BUILTIN_RESEND_KEY__="'${{ secrets.RESEND_API_KEY }}'" --define __BUILTIN_AWS_ACCESS_KEY_ID__="'${{ secrets.AWS_ACCESS_KEY_ID }}'" --define __BUILTIN_AWS_SECRET_ACCESS_KEY__="'${{ secrets.AWS_SECRET_ACCESS_KEY }}'" --define __BUILTIN_AWS_REGION__="'${{ secrets.AWS_REGION }}'" src/main.ts --outfile MyHeadlines

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: MyHeadlines.exe

  build-macos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install web dependencies
        run: cd web && bun install

      - name: Build web frontend
        run: bun run build:web

      - name: Embed web assets
        run: bun scripts/embed-assets.ts

      - name: Compile macOS ARM64 binary
        run: bun build --compile --target=bun-darwin-arm64 --define __BUILTIN_RESEND_KEY__="'${{ secrets.RESEND_API_KEY }}'" --define __BUILTIN_AWS_ACCESS_KEY_ID__="'${{ secrets.AWS_ACCESS_KEY_ID }}'" --define __BUILTIN_AWS_SECRET_ACCESS_KEY__="'${{ secrets.AWS_SECRET_ACCESS_KEY }}'" --define __BUILTIN_AWS_REGION__="'${{ secrets.AWS_REGION }}'" src/main.ts --outfile MyHeadlines-mac-arm64

      - name: Compile macOS x64 binary
        run: bun build --compile --target=bun-darwin-x64 --define __BUILTIN_RESEND_KEY__="'${{ secrets.RESEND_API_KEY }}'" --define __BUILTIN_AWS_ACCESS_KEY_ID__="'${{ secrets.AWS_ACCESS_KEY_ID }}'" --define __BUILTIN_AWS_SECRET_ACCESS_KEY__="'${{ secrets.AWS_SECRET_ACCESS_KEY }}'" --define __BUILTIN_AWS_REGION__="'${{ secrets.AWS_REGION }}'" src/main.ts --outfile MyHeadlines-mac-x64

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: |
            MyHeadlines-mac-arm64
            MyHeadlines-mac-x64

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/windows-binary/MyHeadlines.exe
            artifacts/macos-binaries/MyHeadlines-mac-arm64
            artifacts/macos-binaries/MyHeadlines-mac-x64
